name: Terraform Render

on:
  pull_request:
    paths:
      - infra/terraform/**
      - .github/workflows/terraform-render.yml
  push:
    branches:
      - main
    paths:
      - infra/terraform/**
      - .github/workflows/terraform-render.yml

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Use a safe, secret-free local plan for PRs (including forks).
    # Avoid referencing repository secrets here; forks can't access them.
    defaults:
      run:
        working-directory: infra/terraform

    env:
      TF_VAR_repo_url: https://github.com/${{ github.repository }}
      TF_VAR_branch: main
      # Placeholder non-sensitive values so plan can run without secrets.
      TF_VAR_mongo_uri: "placeholder-mongo-uri"
      TF_VAR_jwt_secret: "placeholder-jwt-secret"
      TF_VAR_github_token: ""
      TF_VAR_cors_allowed_origins_csv: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (local, no backend)
        run: terraform init -input=false -backend=false

      - name: Terraform Fmt Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate || true

      - name: Terraform Plan (local)
        run: terraform plan -input=false -no-color || true

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: infra/terraform

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_OWNER_ID: ${{ secrets.RENDER_OWNER_ID }}
      TF_VAR_repo_url: https://github.com/${{ github.repository }}
      TF_VAR_branch: main
      TF_VAR_mongo_uri: ${{ secrets.MONGO_URI }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_github_token: ${{ secrets.GH_TOKEN_RENDER }}
      TF_VAR_cors_allowed_origins_csv: ${{ secrets.CORS_ALLOWED_ORIGINS_CSV }}
      TF_VAR_tf_organization: ${{ secrets.TF_ORGANIZATION }}
      TF_VAR_tf_workspace: ${{ secrets.TF_WORKSPACE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve
